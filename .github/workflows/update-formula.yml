name: Update Formula

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Update formula from latest release
        run: bash .github/scripts/update_formula.sh

      - name: Smoke test latest release bundle
        run: |
          url="$(ruby -e 'puts File.read("Formula/mat-cli.rb")[/url "([^"]+)"/, 1]')"
          tmp_dir="$(mktemp -d)"
          curl -fsSL -o "${tmp_dir}/mat-cli.zip" "${url}"
          unzip -q "${tmp_dir}/mat-cli.zip" -d "${tmp_dir}"
          env JAVA_HOME="${JAVA_HOME}" "${tmp_dir}/mat-cli/mat-cli" --help > /dev/null

      - name: Commit and push if changed
        run: |
          if git diff --quiet; then
            echo "No formula changes detected."
            exit 0
          fi

          version="$(ruby -e 'puts File.read("Formula/mat-cli.rb")[/version "([^"]+)"/, 1]')"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/mat-cli.rb
          git commit -m "Update mat-cli to ${version}"
          git push
